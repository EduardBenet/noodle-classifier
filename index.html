<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Noodle Classifier 🍜</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
    <link rel="stylesheet" href="assets/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="https://unpkg.com/@zxing/browser@latest"></script>
</head>

<body>
    <header>
        <h1><a href="#" id="home-link">🍜 Instant Noodle Classifier</a></h1>
        <nav>
            <button class="tab-btn active" data-tab="list">List</button>
            <button class="tab-btn" data-tab="search">Search</button>
            <button class="tab-btn" data-tab="add">Add</button>
        </nav>
    </header>

    <main>
        <section id="tab-home" class="tab home-view active">
            <h2 id="noodle-of-the-day-heading">Noodle of the day! 🍜</h2>
            <div id="noodle-of-the-day"></div>
        </section>

        <section id="tab-list" class="tab">
            <div class="list-filters">
                <select id="sort-by">
                    <option value="">Sort by...</option>
                    <option value="rating-desc">★ Rating (best first)</option>
                    <option value="rating-asc">★ Rating (worst first)</option>
                    <option value="spicy-desc">🌶️ Spiciest first</option>
                    <option value="spicy-asc">🌶️ Mildest first</option>
                    <option value="price-asc">£ Price (low → high)</option>
                    <option value="price-desc">£ Price (high → low)</option>
                </select>
            </div>
            <div id="noodle-list"></div>
        </section>

        <section id="tab-search" class="tab">
            <input type="text" id="search" placeholder="Search by brand or keyword...">
            <div id="search-results"></div>
        </section>

        <section id="tab-add" class="tab">

            <form id="add-form">
                <div class="barcode-row">
                    <input type="text" id="product-id" placeholder="Product ID (Barcode)" required>
                    <button type="button" onclick="startScanner()">📷</button>
                </div>
                <div id="reader-container" style="display: none; margin-top: 10px;">
                    <video id="video-preview" autoplay muted playsinline
                        style="width: 100%; max-height: 300px; border: 1px solid #ccc; border-radius: 8px;"></video>
                </div>
                <input type="text" id="name" placeholder="Name" required>
                <input type="text" id="brand" placeholder="Brand" required>
                <input type="number" id="price" placeholder="Price (£)" step="0.01" min="0" required>
                <textarea id="description" placeholder="Description" required></textarea>
                <div class="barcode-row">
                    <label for="hasSoup">Comes with soup</label>
                    <input type="checkbox" id="hasSoup">
                </div>
                <label for="spicy">Spice Level:</label>
                <select id="spicy" name="spicy">
                    <option value="0">None</option>
                    <option value="1">🌶️</option>
                    <option value="2">🌶️🌶️</option>
                    <option value="3">🌶️🌶️🌶️</option>
                    <option value="4">🌶️🌶️🌶️🌶️</option>
                    <option value="5">🌶️🌶️🌶️🌶️🌶️</option>
                </select>

                <div class="spice-row">
                    <label>Rating:</label>
                    <div class="spice-chilies">
                        <input type="radio" name="spice" id="star5" value="5"><label for="star5">🌶️</label>
                        <input type="radio" name="spice" id="star4" value="4"><label for="star4">🌶️</label>
                        <input type="radio" name="spice" id="star3" value="3"><label for="star3">🌶️</label>
                        <input type="radio" name="spice" id="star2" value="2"><label for="star2">🌶️</label>
                        <input type="radio" name="spice" id="star1" value="1"><label for="star1">🌶️</label>
                    </div>
                </div>

                <div class="rating-row">
                    <label>Rating:</label>
                    <div class="rating-stars">
                        <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
                        <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
                        <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
                        <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
                        <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
                    </div>
                </div>

                <input type="text" id="keywords" placeholder="Keywords (comma-separated)">
                <input type="text" id="image" placeholder="Image filename (e.g. shin.jpg)">
                <button type="submit">Add Noodle</button>
            </form>
        </section>
    </main>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/list.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/add.js"></script>
</body>

</html>
