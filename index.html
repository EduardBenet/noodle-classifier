<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Noodle Classifier 🍜</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
    <link rel="stylesheet" href="assets/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="https://unpkg.com/@zxing/browser@latest"></script>
</head>

<body>
    <header>
        <h1><a href="#" id="home-link">🍜 Instant Noodle Classifier</a></h1>
        <nav class="owner-only">
            <button class="tab-btn active" data-tab="list">List</button>
            <button class="tab-btn" data-tab="add">Add</button>
        </nav>
        <div id="auth-area">
            <button id="auth-menu-btn" class="profile-btn" title="Account">
                <svg id="auth-anon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
                <img id="auth-avatar-icon" alt="">
            </button>
            <div id="auth-dropdown">
                <div id="dropdown-loggedout">
                    <a href="/api/auth" class="dropdown-item">Login with GitHub</a>
                    <a href="/api/auth/google" class="dropdown-item">Login with Google</a>
                </div>
                <div id="dropdown-user">
                    <div class="dropdown-name" id="dropdown-name"></div>
                    <button class="dropdown-item" id="dropdown-profile">My Profile</button>
                    <button class="dropdown-item dropdown-item-danger" id="dropdown-logout">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <div id="confirm-dialog" class="confirm-backdrop">
        <div class="confirm-box">
            <p id="confirm-message"></p>
            <div class="confirm-buttons">
                <button id="confirm-cancel">Cancel</button>
                <button id="confirm-ok" class="confirm-ok">Update</button>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-card">
            <div class="overlay-actions">
                <button id="overlay-edit" class="owner-only" title="Edit">✏️</button>
                <button id="overlay-close">✕</button>
            </div>
            <h2 id="overlay-title">Noodle of the Day 🍜</h2>
            <div id="noodle-of-the-day"></div>
        </div>
    </div>

    <main>
        <section id="tab-list" class="tab active">
            <div class="list-filters">
                <input type="text" id="search" placeholder="Search...">
                <select id="sort-by">
                    <option value="">Sort by...</option>
                    <option value="rating-desc">★ Rating (best first)</option>
                    <option value="rating-asc">★ Rating (worst first)</option>
                    <option value="spicy-desc">🌶️ Spiciest first</option>
                    <option value="spicy-asc">🌶️ Mildest first</option>
                    <option value="price-asc">£ Price (low → high)</option>
                    <option value="price-desc">£ Price (high → low)</option>
                </select>
            </div>
            <div id="noodle-list"></div>
        </section>


        <section id="tab-add" class="tab">

            <form id="add-form">
                <div class="barcode-row">
                    <input type="text" id="product-id" placeholder="Product ID (Barcode)" required>
                    <button type="button" onclick="startScanner()">📷</button>
                </div>
                <div id="reader-container" style="display: none; margin-top: 10px;">
                    <video id="video-preview" autoplay muted playsinline
                        style="width: 100%; max-height: 300px; display: block;"></video>
                </div>
                <input type="text" id="name" placeholder="Name" required>
                <input type="text" id="brand" placeholder="Brand" required>
                <input type="number" id="price" placeholder="Price (£)" step="0.01" min="0" required>
                <textarea id="description" placeholder="Description" required></textarea>
                <div class="checkbox-row">
                    <label for="hasSoup">Comes with soup:</label>
                    <input type="checkbox" id="hasSoup">
                </div>
                <div class="spice-row">
                    <label>Spice Level:</label>
                    <div class="spice-chilies">
                        <input type="radio" name="spice" id="spice5" value="5"><label for="spice5">🌶️</label>
                        <input type="radio" name="spice" id="spice4" value="4"><label for="spice4">🌶️</label>
                        <input type="radio" name="spice" id="spice3" value="3"><label for="spice3">🌶️</label>
                        <input type="radio" name="spice" id="spice2" value="2"><label for="spice2">🌶️</label>
                        <input type="radio" name="spice" id="spice1" value="1"><label for="spice1">🌶️</label>
                    </div>
                </div>

                <div class="rating-row">
                    <label>Rating:</label>
                    <div class="rating-stars">
                        <input type="radio" name="rating" id="rating5" value="5"><label for="rating5">★</label>
                        <input type="radio" name="rating" id="rating4" value="4"><label for="rating4">★</label>
                        <input type="radio" name="rating" id="rating3" value="3"><label for="rating3">★</label>
                        <input type="radio" name="rating" id="rating2" value="2"><label for="rating2">★</label>
                        <input type="radio" name="rating" id="rating1" value="1"><label for="rating1">★</label>
                    </div>
                </div>

                <input type="text" id="keywords" placeholder="Keywords (comma-separated)">
                <input type="text" id="image" placeholder="Image filename (e.g. shin.jpg)">
                <button type="submit">Add Noodle</button>
            </form>
        </section>

    </main>

    <div id="profile-overlay">
        <div id="profile-card">
            <button id="profile-close">✕</button>
            <img id="profile-avatar-large" class="profile-avatar-large" alt="">
            <h2 id="welcome-msg"></h2>
            <div class="profile-stats">
                <div class="stat-card">
                    <div class="stat-value" id="stat-count">—</div>
                    <div class="stat-label">Noodles rated</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-best">—</div>
                    <div class="stat-label">Best noodle</div>
                </div>
            </div>
            <button id="logout-btn">Logout</button>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/list.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/add.js"></script>
</body>

</html>
